```html
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Tycoon</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      text-align: center;
      margin-top: 30px;
    }

    button {
      background: white;
      border: none;
      padding: 12px 18px;
      margin: 6px;
      cursor: pointer;
      border-radius: 50px;
      font-weight: bold;
      color: black;
      transition: 0.25s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    button:hover {
      transform: scale(1.05);
    }

    .menu {
      margin-top: 20px;
      padding: 15px;
      background: black;
      border-radius: 12px;
      width: 260px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    .kucuk {
      width: 200px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>MENU</h1>

<button onclick="toggle('soup')">Çorbalar</button>
<button onclick="toggle('salad')">Salatalar</button>
<button onclick="toggle('food')">Et Yemekleri</button>

<div id="soup" class="menu" style="display:none;">
  <h2>Mercimek Çorbası</h2>
  <img src="https://www.trakyagezi.com/wp-content/uploads/2016/05/MercimekÇorbası.jpg"
    class="kucuk"
  <p>105 TL</p>

  <h2>Ezogelin</h2>
  <img src="https://www.nizampide.com/wp-content/uploads/2018/07/ezogelin-çorbası-nizam-pide-sütlaç-istanbul-beyoğlu-istiklal-caddesi-600x600.jpg"
    class="kucuk"
  <p>120 TL</p>
</div>

<div id="salad" class="menu" style="display:none;">
  <h2>Çoban Salata</h2>
  <img src="https://www.kevserinmutfagi.com/wp-content/uploads/2012/10/coban_salata1-600x450.jpg"
    class="kucuk"
  <p>80 TL</p>

  <h2>Mevsim Salata</h2>
  <img src="https://korgan.com.tr/wp-content/uploads/2024/07/19-Mevsim-Salata.jpg"
    class="kucuk"
  <p>90 TL</p>
</div>

<div id="food" class="menu" style="display:none;">
  <h2>Adana Kebap</h2>
  <img src="https://media-cdn.tripadvisor.com/media/photo-m/1280/31/6a/d9/9d/caption.jpg"
       class="kucuk">
  <p>458 TL</p>

  <h2>kebap</h2>
  <img src="https://www.kulturportali.gov.tr/repoKulturPortali/large/SehirRehberi//TurkMutfagi/20201017083536688_adana%20kebabi.jpeg?format=jpg&quality=50"
       class="kucuk"
  <p>120 TL</p>
</div>

<script>
function toggle(id) {
  const el = document.getElementById(id);

  if (el.style.display === "none") {
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}
</script>

</body>
</html>
``
