<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>butonu tıkla la</title>

<style>
body{
margin:0;
height:100vh;
background:rgb(84, 82, 82);
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

#txt{
color:white;
margin-top:20px;
font-size:20px;
}

#img{
width:150px;
margin-top:20px;
border-radius:10px;
}

#btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
background:white;
border:none;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<img id="img" src="https://i.pinimg.com/736x/26/c4/c1/26c4c189f8662ce06481863f853fe4e2.jpg">

<div id="txt">butona bas pls</div>

<button id="btn">TIKLA</button>

<script>

let sayac = 0;

const btn = document.getElementById("btn");
const txt = document.getElementById("txt");
const img = document.getElementById("img");

btn.onclick = function () {

sayac++;

if (sayac >= 10) {

btn.style.left = "50%";
btn.style.top = "50%";
btn.style.transform = "translate(-50%,-50%)";

btn.onclick = function () {
txt.innerHTML = "sen malsın abi";
img.src = "https://foto.sondakika.com/haber/2023/08/31/findik-toplamaya-gittigi-bahcede-hayatini-kay-16281976_amp.jpg";
btn.style.display = "none";
};

return;
}

let x = Math.random() * (window.innerWidth - 100);
let y = Math.random() * (window.innerHeight - 50);

btn.style.left = x + "px";
btn.style.top = y + "px";

};

</script>

</body>
</html>
